<!DOCTYPE html>
{% load static %}
<html>
    <head>
        <!--[if lte IE 8]>
            <script src="{% static 'js/excanvas.js' %}"></script>
        <![endif]-->
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html, body {
                width: 100%;
                height: 100%;
                overflow: hidden;
            }
            body {
                display: flex;
                flex-direction: column;
                background: #f8f9fa;
            }
            .controls {
                flex-shrink: 0;
                padding: 12px;
                background: #ffffff;
                border-bottom: 1px solid #dee2e6;
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }
            .btn-group {
                display: flex;
                gap: 5px;
            }
            .chart-container {
                flex: 1;
                position: relative;
                background: white;
                margin: 5px;
                border-radius: 4px;
                min-height: 0;
            }
            #myChart {
                max-width: 100%;
                max-height: 100%;
            }
        </style>
    </head>
    <body>

        <div class="controls">
            <div class="btn-group" role="group" aria-label="Data Type">
                <button type="button" class="btn btn-info active" onclick="setDataType('temperature')">Lämpötila</button>
                <button type="button" class="btn btn-info" onclick="setDataType('humidity')">Kosteus</button>
            </div>

            <div class="btn-group" role="group" aria-label="Time Range">
                <button type="button" class="btn btn-primary" onclick="updateChart(30)">30 min</button>
                <button type="button" class="btn btn-primary" onclick="updateChart(60)">1h</button>
                <button type="button" class="btn btn-primary" onclick="updateChart(480)">8h</button>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>

        <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/date-fns/1.30.1/date_fns.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom/dist/chartjs-plugin-zoom.min.js"></script>

        <script type="text/javascript">
            var chart;
            var currentDataType = 'temperature';
            var currentMinutes = 30; // Default to 30 minutes

            function setDataType(dataType) {
                currentDataType = dataType;
                // Update button styling
                document.querySelectorAll('[role="group"][aria-label="Data Type"] button').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
                updateChart(currentMinutes);
            }

            function updateChart(minutes) {
                currentMinutes = minutes; // Store current minutes
                $.get('{% url "line_chart_json" %}?type=' + currentDataType + '&minutes=' + minutes, function(data) {
                    if (chart) {
                        chart.destroy();
                    }

                    var ctx = $("#myChart").get(0).getContext("2d");

                    chart = new Chart(ctx, {
                        type: 'line',
                        data: data,
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: {
                                intersect: false,
                                mode: 'index'
                            },
                            scales: {
                                x: {
                                    type: "time",
                                    time: {
                                        unit: "minute",
                                        tooltipFormat: 'HH:mm',
                                        displayFormats: {
                                            minute: 'HH:mm'
                                        }
                                    }
                                },
                                y: {
                                    beginAtZero: true
                                }
                            },
                            plugins: {
                                zoom: {
                                    zoom: {
                                        wheel: {
                                            enabled: true
                                        },
                                        pinch: {
                                            enabled: true
                                        },
                                        mode: 'x'
                                    },
                                    pan: {
                                        enabled: true,
                                        mode: 'x'
                                    }
                                }
                            }
                        }
                    });
                });
            }

            $(document).ready(function() {
                updateChart(30);
            });
        </script>
    </body>
</html>
